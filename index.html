<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Run Tracker</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:#fff; }
#map { height:50vh; }
#ui { padding:15px; }
button { padding:10px 15px; font-size:16px; }
.stat { margin:5px 0; }
</style>
</head>
<body>

<div id="map"></div>

<div id="ui">
  <button id="btn">Start</button>
  <div class="stat">Speed: <span id="speed">0</span> km/h</div>
  <div class="stat">Avg: <span id="avg">0</span> km/h</div>
  <div class="stat">Max: <span id="max">0</span> km/h</div>
  <div class="stat">Dist: <span id="dist">0</span> km</div>
  <div class="stat">Time: <span id="time">0:00</span></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const S={
  tracking:false,
  t0:0,
  speed:0,
  maxSpd:0,
  avgSpd:0,
  dist:0,
  elapsed:0,
  buf:[],
  hist:[],
  pts:[],
  lastPt:null,
  map:null,
  smkr:null,
  pmkr:null,
  prevLL:null,
  segs:[]
};

function $(id){return document.getElementById(id);}

function fmtT(ms){
  const s=Math.floor(ms/1000);
  const m=Math.floor(s/60);
  return m+':'+String(s%60).padStart(2,'0');
}

function hav(a,b){
  const R=6371;
  const dLat=(b.lat-a.lat)*Math.PI/180;
  const dLon=(b.lon-a.lon)*Math.PI/180;
  const lat1=a.lat*Math.PI/180;
  const lat2=b.lat*Math.PI/180;

  const x=Math.sin(dLat/2)**2+
    Math.sin(dLon/2)**2*Math.cos(lat1)*Math.cos(lat2);

  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function spdColor(s){
  if(s<6) return '#30d158';
  if(s<12) return '#ffd60a';
  return '#ff3b30';
}

function initMap(){
  if(S.map) return;

  const map=L.map('map',{zoomControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    maxZoom:19
  }).addTo(map);

  map.setView([48.2,13.5],15);
  S.map=map;

  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>map.invalidateSize());
  });
}

function mapAddPoint(lat,lon,spd){
  if(!S.map) return;

  if(!S.smkr){
    S.smkr=L.circleMarker([lat,lon],{
      radius:8,color:'#fff',weight:2,fillColor:'#30d158',fillOpacity:1
    }).addTo(S.map);

    S.map.setView([lat,lon],17);
  } else {
    S.smkr.setLatLng([lat,lon]);
  }

  if(S.prevLL){
    const seg=L.polyline([S.prevLL,[lat,lon]],{
      color:spdColor(spd),
      weight:5
    }).addTo(S.map);

    S.segs.push(seg);
  }

  S.prevLL=[lat,lon];

  if(!S.pmkr){
    S.pmkr=L.circleMarker([lat,lon],{
      radius:9,color:'#fff',weight:2,
      fillColor:spdColor(spd),fillOpacity:1
    }).addTo(S.map);
  } else {
    S.pmkr.setLatLng([lat,lon]);
    S.pmkr.setStyle({fillColor:spdColor(spd)});
  }

  S.map.panTo([lat,lon],{animate:true});
}

function updateUI(){
  $('speed').textContent=S.speed.toFixed(1);
  $('avg').textContent=S.avgSpd.toFixed(1);
  $('max').textContent=S.maxSpd.toFixed(1);
  $('dist').textContent=S.dist.toFixed(2);
  $('time').textContent=fmtT(S.elapsed);
}

function onPos(pos){
  const now=Date.now();
  const lat=pos.coords.latitude;
  const lon=pos.coords.longitude;

  if(!S.tracking){
    if(S.map) S.map.setView([lat,lon],16);
    return;
  }

  let raw=0;
  if(pos.coords.speed!=null){
    raw=pos.coords.speed*3.6;
  }

  const cur={lat,lon,time:now,speed:raw};

  if(S.lastPt){
    const dt=(now-S.lastPt.time)/1000;
    const dk=hav(S.lastPt,cur);

    if(dt>0 && dt<20 && dk<0.5){
      S.dist+=dk;
      if(raw===0) raw=(dk/dt)*3600;
    }
  }

  S.lastPt=cur;
  S.pts.push(cur);

  S.buf.push(raw);
  if(S.buf.length>3) S.buf.shift();

  S.speed=S.buf.reduce((a,b)=>a+b,0)/S.buf.length;

  if(S.speed>S.maxSpd) S.maxSpd=S.speed;

  S.hist.push({s:S.speed,t:now});
  const mv=S.hist.filter(p=>p.s>2);

  S.avgSpd=mv.length
    ? mv.reduce((a,b)=>a+b.s,0)/mv.length
    : 0;

  updateUI();

  mapAddPoint(lat,lon,S.speed);
}

function start(){
  S.tracking=true;
  S.t0=Date.now();

  S.speed=0;
  S.maxSpd=0;
  S.avgSpd=0;
  S.dist=0;
  S.elapsed=0;
  S.buf=[];
  S.hist=[];
  S.pts=[];
  S.lastPt=null;

  setInterval(()=>{
    S.elapsed=Date.now()-S.t0;
    updateUI();
  },1000);
}

$('btn').onclick=()=>{
  if(!S.tracking){
    start();
    $('btn').textContent='Stop';
  } else {
    location.reload();
  }
};

initMap();

navigator.geolocation.watchPosition(onPos,console.error,{
  enableHighAccuracy:true,
  maximumAge:0,
  timeout:5000
});
</script>

</body>
</html>
